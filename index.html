<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <section class="todo-app">
        <header class="app-header">
          <div>
            <p class="eyebrow">Local tasks</p>
            <h1 id="app-title">To-Do List</h1>
          </div>
          <button
            class="icon-button"
            id="theme-toggle"
            type="button"
            aria-label="Switch to dark mode"
            title="Toggle dark mode"
          >
            <span id="theme-icon" aria-hidden="true">Dark</span>
          </button>
        </header>

        <form class="todo-form" id="todo-form" autocomplete="off">
          <label class="sr-only" for="todo-input">New task</label>
          <input
            id="todo-input"
            name="todo"
            type="text"
            placeholder="Add a new task..."
            maxlength="120"
          />
          <button class="primary-button" type="submit">Add</button>
        </form>

        <div class="toolbar" aria-label="Task filters">
          <div class="filters" role="group" aria-label="Filter tasks">
            <button class="filter-button active" type="button" data-filter="all">
              All
            </button>
            <button class="filter-button" type="button" data-filter="active">
              Active
            </button>
            <button class="filter-button" type="button" data-filter="completed">
              Completed
            </button>
          </div>
          <button class="ghost-button" id="clear-completed" type="button">
            Clear completed
          </button>
        </div>

        <p class="task-count" id="task-count" aria-live="polite">0 tasks left</p>

        <ul class="todo-list" id="todo-list" aria-label="Tasks"></ul>

        <p class="empty-state" id="empty-state">No tasks yet.</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
